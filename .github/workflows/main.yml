name: G2Ray - Always On (6 Hours)

on:
  workflow_dispatch:  # فقط دستی اجرا کن

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 ساعت حداکثر
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xray
        run: |
          # نصب ابزارها
          sudo apt-get update
          sudo apt-get install -y curl unzip jq uuid-runtime

          # نصب Xray
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o xray.zip -d xray
          sudo mv xray/xray /usr/local/bin/
          sudo chmod +x /usr/local/bin/xray
          rm -rf xray xray.zip

          # ساخت UUID جدید
          UUID=$(uuidgen | tr '[:upper:]' '[:lower:]')
          
          # آپدیت کانفیگ
          jq --arg uuid "$UUID" '.inbounds[0].settings.clients[0].id = $uuid' .devcontainer/config.json > config.json
          mv config.json .devcontainer/config.json

          # گرفتن IP
          SERVER_IP=$(curl -s ifconfig.me)

          # ساخت لینک
          VLESS_LINK="vless://$UUID@$SERVER_IP:443?encryption=none&security=tls&type=xhttp&mode=packet-up&sni=www.speedtest.net&flow=#G2Ray-VLESS"

          # ذخیره لینک برای نمایش
          echo "VLESS_LINK=$VLESS_LINK" >> $GITHUB_ENV
          
          # نمایش لینک
          echo ""
          echo "═══════════════════════════════════════════════"
          echo "✅ لینک VLESS (تا ۶ ساعت اعتبار دارد):"
          echo "$VLESS_LINK"
          echo "═══════════════════════════════════════════════"
          echo ""
          echo "🚀 سرویس روشن شد. تا ۶ ساعت آینده فعال خواهد ماند."

          # اجرای Xray در background
          sudo /usr/local/bin/xray -c .devcontainer/config.json &
          
          # خروجی IP و پورت برای یادآوری
          echo ""
          echo "📡 اطلاعات سرویس:"
          echo "   IP: $SERVER_IP"
          echo "   Port: 443"
          echo "   Protocol: VLESS + XHTTP + TLS"

      - name: Keep Alive (6 Hours)
        run: |
          echo "🔥 سرویس در حال اجراست..."
          echo "⏰ تا ۶ ساعت دیگر روشن می‌ماند"
          echo "💡 برای خاموش کردن: روی 'Cancel workflow' در GitHub کلیک کن"
          echo ""
          echo "لینک VLESS دوباره:"
          echo "${{ env.VLESS_LINK }}"
          echo ""
          # این خط سرویس را تا ۶ ساعت روشن نگه می‌دارد
          sleep 21600  # 6 ساعت = 21600 ثانیه

      - name: Cleanup
        if: always()
        run: |
          echo "⏱️ زمان اجرا به پایان رسید. سرویس در حال خاموش شدن..."
          sudo pkill xray || true
